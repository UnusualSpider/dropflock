apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: dropflock
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: backend
          # TODO: build and push before this can run. Image is a placeholder.
          #
          #   docker build -t ghcr.io/unusualspider/dropflock-backend:latest backend/
          #   docker push ghcr.io/unusualspider/dropflock-backend:latest
          #
          # (or use a multi-arch buildx command for amd64 + arm64)
          image: ghcr.io/unusualspider/dropflock-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # Build DATABASE_URL from the sealed secret. Backend prefers a
            # full DATABASE_URL over individual DB_* vars (see config.go).
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)?sslmode=disable"
            # PORT / APP_ENV come from the configmap via envFrom below.
            # POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB come from the
            # sealed secret via envFrom below.
            - name: GIN_MODE
              value: "release"
            # Bearer token required for admin writes (POST/PUT/DELETE).
            # Sourced from the same SealedSecret as the DB password. The
            # Go middleware reads it via os.Getenv("ADMIN_TOKEN") at request
            # time. See k8s/README.md for the kubeseal procedure.
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: admin_token
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: postgres-credentials
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30   # 30 * 5s = 150s, enough for migrations
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # Backend writes nothing to disk; tmpfs for /tmp if it ever needs to.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
