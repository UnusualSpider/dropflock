apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: dropflock
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: frontend
          # TODO: build and push before this can run. Image is a placeholder.
          #
          #   docker build -t ghcr.io/unusualspider/dropflock-frontend:latest app/
          #   docker push ghcr.io/unusualspider/dropflock-frontend:latest
          #
          # Next.js must be built in standalone output mode (see next.config.ts:
          # `output: 'standalone'`) for the resulting image to be a small
          # runtime. The image's CMD should be `node server.js` and listen on
          # port 3000, or `next start -p 3000`.
          image: ghcr.io/unusualspider/dropflock-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            # Same-origin API calls. The ingress routes /api to the backend
            # service, so the frontend can use a relative path.
            # Override at deploy time if you split into api.dropflock.org.
            - name: NEXT_PUBLIC_API_URL
              value: "/api"
            # Tell Next.js it's behind a proxy (NPM → ingress-nginx → pod).
            # Required for correct redirect/cookie handling.
            - name: NODE_ENV
              value: "production"
            # Backend URL used by the server-side fetch layer (app/lib/api.ts).
            # Only used at request time, on the server, so it stays out of the
            # browser bundle. The in-cluster Service DNS is stable; no
            # `http://` URL gets bundled into client JS.
            - name: BACKEND_INTERNAL_URL
              value: "http://backend.dropflock.svc.cluster.local:8080"
            # Bearer token used by the /api/groups Next.js route handler when
            # it forwards form submissions to the backend. Server-only.
            # Sourced from the SealedSecret at k8s/postgres/secret.yaml
            # (key: admin_token). See k8s/README.md for how to seal.
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: admin_token
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # Next.js standalone output needs .next/ writable. The Dockerfile
          # should chown the working dir to 65532:65532 at build time.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.next/cache
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: cache
          emptyDir:
            sizeLimit: 256Mi
