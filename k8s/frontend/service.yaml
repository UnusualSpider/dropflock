apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: dropflock
  labels:
    app: frontend
spec:
  type: ClusterIP
  ports:
    - name: http
      # Service port 80 → containerPort 3000. Ingress-nginx talks to the
      # service port, so this gives us a clean separation between
      # "what users see" (port 80) and "what the container listens on" (3000).
      port: 80
      targetPort: 3000
      protocol: TCP
  selector:
    app: frontend
