# =============================================================================
# Sealed Secret — postgres-credentials
# =============================================================================
# This file should contain a `kind: SealedSecret` (apiVersion: bitnami.com/v1alpha1)
# produced by `kubeseal`. The cluster must have the Sealed Secrets controller
# (https://github.com/bitnami-labs/sealed-secrets) installed in order to decrypt
# this resource into a normal `Secret` named `postgres-credentials`.
#
# TODO — fill in the real values before this will work:
#
#   1. Generate a plaintext manifest locally (do NOT commit it):
#        kubectl -n dropflock create secret generic postgres-credentials \
#          --from-literal=POSTGRES_USER=dropflock \
#          --from-literal=POSTGRES_PASSWORD='<strong-random-password>' \
#          --from-literal=POSTGRES_DB=dropflock \
#          --dry-run=client -o yaml > /tmp/postgres-creds-plaintext.yaml
#
#   2. Seal it against the cluster's sealing key:
#        kubeseal --format yaml \
#          --controller-name=sealed-secrets \
#          --controller-namespace=kube-system \
#          < /tmp/postgres-creds-plaintext.yaml > k8s/postgres/secret.yaml
#
#   3. Delete the plaintext file:
#        rm /tmp/postgres-creds-plaintext.yaml
#
#   4. Commit the new `k8s/postgres/secret.yaml` and push. ArgoCD will pick it up
#      and the Sealed Secrets controller will materialize the real Secret.
#
# Until this is done, the SealedSecret below is a NO-OP and the Postgres pod
# will crash-loop on missing env vars. The Deployment tolerates a missing
# secret only because the StatefulSet keys are set to `optional: false`.
# =============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: postgres-credentials
  namespace: dropflock
  annotations:
    # TODO: regenerate with the kubeseal command above before applying.
    sealedsecrets.bitnami.com/managed-by: "dropflock-bootstrap"
spec:
  template:
    metadata:
      name: postgres-credentials
      namespace: dropflock
    type: Opaque
  # Placeholder — EMPTY ciphertext. The Sealed Secrets controller will reject
  # this on first sync, which is intentional: it surfaces the missing
  # bootstrap step instead of silently creating a broken Secret.
  encryptedData:
    POSTGRES_USER: ""
    POSTGRES_PASSWORD: ""
    POSTGRES_DB: ""
